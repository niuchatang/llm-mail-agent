<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Mail Agent</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0b1220 0%, #111a2c 55%, #1a2440 100%);
      margin: 0;
      color: #e5e7eb;
    }
    .container {
      max-width: 1080px;
      margin: 28px auto;
      padding: 0 18px 28px;
    }
    .card {
      background: rgba(12, 19, 33, 0.78);
      border-radius: 16px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      box-shadow: 0 20px 38px rgba(2, 6, 23, 0.45);
      backdrop-filter: blur(4px);
      padding: 20px;
      margin-bottom: 16px;
    }
    h1 { margin: 0 0 10px; font-size: 24px; color: #f8fafc; }
    .muted { color: #9aa4b2; margin: 0 0 16px; }
    label { display: block; font-weight: 600; margin: 10px 0 6px; }
    input, textarea, button {
      width: 100%;
      box-sizing: border-box;
      font-size: 14px;
      border-radius: 10px;
    }
    input, textarea {
      border: 1px solid rgba(148, 163, 184, 0.35);
      padding: 11px 12px;
      background: rgba(15, 23, 42, 0.85);
      color: #f1f5f9;
    }
    input::placeholder { color: #94a3b8; }
    textarea { min-height: 140px; resize: vertical; }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .password-wrap {
      position: relative;
    }
    .password-wrap input {
      padding-right: 44px;
    }
    .eye-btn {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 30px;
      height: 30px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: #cbd5e1;
      cursor: pointer;
      margin-top: 0;
      padding: 0;
      font-size: 16px;
      line-height: 1;
    }
    .eye-btn:hover {
      background: rgba(148, 163, 184, 0.18);
    }
    button {
      border: none;
      margin-top: 14px;
      padding: 11px 14px;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff;
      transition: transform .15s ease, box-shadow .15s ease, opacity .2s ease;
    }
    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.28);
    }
    button:disabled { opacity: .6; cursor: not-allowed; }
    pre {
      margin: 0;
      white-space: pre-wrap;
      background: #020617;
      color: #d1f7e4;
      border-radius: 8px;
      padding: 14px;
      font-size: 13px;
      line-height: 1.45;
    }
    .status {
      font-size: 13px;
      color: #a3b3c7;
      margin-top: 8px;
    }
    .pending-item {
      border: 1px solid #e4e7ec;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
      background: #fff;
    }
    .group-title {
      font-size: 14px;
      font-weight: 700;
      color: #dbeafe;
      margin: 12px 0 8px;
      padding: 6px 10px;
      background: rgba(37, 99, 235, 0.18);
      border-radius: 8px;
      border: 1px solid rgba(96, 165, 250, 0.35);
    }
    .pending-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.22);
      color: #bfdbfe;
      font-size: 12px;
      margin-right: 6px;
    }
    .mini-btn {
      width: auto;
      display: inline-block;
      margin-top: 8px;
      margin-right: 8px;
      padding: 7px 10px;
      font-size: 12px;
      background: #175cd3;
    }
    .mini-btn.secondary {
      background: #667085;
    }
    .login-card {
      border: 1px solid rgba(96, 165, 250, 0.28);
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1.05fr 1.4fr;
      gap: 0;
      padding: 0;
      animation: loginCardIn .45s ease-out;
    }
    .login-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #60a5fa, #22d3ee);
    }
    .login-card::after {
      content: "";
      position: absolute;
      inset: -35%;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.15), transparent 62%);
      animation: floatingGlow 8s ease-in-out infinite;
      pointer-events: none;
    }
    .login-hero {
      padding: 24px;
      background:
        radial-gradient(circle at 20% 10%, rgba(96, 165, 250, 0.28), transparent 45%),
        radial-gradient(circle at 80% 80%, rgba(34, 211, 238, 0.2), transparent 45%),
        rgba(15, 23, 42, 0.94);
      border-right: 1px solid rgba(148, 163, 184, 0.2);
      min-height: 100%;
    }
    .login-hero h2 {
      margin: 0 0 8px;
      color: #eff6ff;
      font-size: 22px;
      letter-spacing: 0.2px;
    }
    .mascot-wrap {
      display: flex;
      justify-content: center;
      margin: 2px 0 12px;
    }
    .mascot {
      width: 260px;
      height: 170px;
      animation: mascotFloat 3.2s ease-in-out infinite;
      filter: drop-shadow(0 10px 16px rgba(37, 99, 235, 0.26));
      user-select: none;
      pointer-events: none;
    }
    .eye-white {
      transform-origin: center;
      animation: eyeBlink 4.8s infinite;
    }
    .login-hero p {
      margin: 0;
      color: #cbd5e1;
      line-height: 1.5;
      font-size: 13px;
    }
    .feature-list {
      margin-top: 16px;
      padding: 0;
      list-style: none;
      color: #dbeafe;
      font-size: 12px;
    }
    .feature-list li {
      margin-bottom: 8px;
      padding-left: 18px;
      position: relative;
    }
    .feature-list li::before {
      content: "✓";
      position: absolute;
      left: 0;
      color: #60a5fa;
      font-weight: 700;
    }
    .login-form {
      padding: 20px;
    }
    .login-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 18px;
      font-weight: 700;
      margin: 2px 0 4px;
      color: #f8fafc;
    }
    .login-subtitle {
      margin: 0 0 12px;
      color: #9aa4b2;
      font-size: 13px;
    }
    .badge-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .badge {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.18);
      color: #bfdbfe;
      border: 1px solid rgba(96, 165, 250, 0.35);
    }
    #loginMailboxBtn {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
    }
    #loginMailboxBtn.loading {
      position: relative;
      color: rgba(255, 255, 255, 0.9);
      pointer-events: none;
    }
    #loginMailboxBtn.loading::after {
      content: "";
      position: absolute;
      right: 12px;
      top: calc(50% - 7px);
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      animation: spin .8s linear infinite;
    }
    #logoutMailboxBtn {
      background: rgba(15, 23, 42, 0.6);
      color: #cbd5e1;
      border: 1px solid rgba(148, 163, 184, 0.35);
    }
    #logoutMailboxBtn:hover:not(:disabled) {
      box-shadow: 0 8px 18px rgba(71, 84, 103, 0.18);
    }
    .hidden {
      display: none;
    }
    .fade-in {
      animation: fadeInUp .25s ease-out;
    }
    .shake {
      animation: shakeX .3s ease;
    }
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes loginCardIn {
      from {
        opacity: 0;
        transform: translateY(12px) scale(0.99);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    @keyframes floatingGlow {
      0%, 100% {
        transform: translate(-6%, -4%) rotate(0deg);
        opacity: .7;
      }
      50% {
        transform: translate(7%, 6%) rotate(12deg);
        opacity: 1;
      }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes shakeX {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }
    @keyframes mascotFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    @keyframes eyeBlink {
      0%, 46%, 50%, 100% { transform: scaleY(1); }
      48% { transform: scaleY(0.18); }
    }
    @media (max-width: 860px) {
      .login-card {
        grid-template-columns: 1fr;
      }
      .login-hero {
        border-right: none;
        border-bottom: 1px solid rgba(148, 163, 184, 0.2);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>LLM Mail Agent 控制台</h1>
      <p class="muted">主流程：邮箱账号登录 -> 分类未读邮件 -> 按分类确认执行。</p>
      <div id="status" class="status">Ready</div>
    </div>

    <div id="loginCard" class="card login-card">
      <div class="login-hero">
        <div class="mascot-wrap">
          <svg id="mascotSvg" class="mascot" viewBox="0 0 260 170" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <g>
              <rect x="22" y="52" width="38" height="88" rx="14" fill="#38bdf8"/>
              <rect x="20" y="30" width="42" height="32" rx="10" fill="#7dd3fc"/>
              <ellipse class="eye-white" cx="34" cy="45" rx="5.5" ry="5.2" fill="#f8fafc"/>
              <ellipse class="eye-white" cx="48" cy="45" rx="5.5" ry="5.2" fill="#f8fafc"/>
              <circle class="pupil" cx="34" cy="45" r="2.2" fill="#0f172a" data-bx="34" data-by="45" data-mult="1.0"/>
              <circle class="pupil" cx="48" cy="45" r="2.2" fill="#0f172a" data-bx="48" data-by="45" data-mult="1.0"/>
              <path class="mouth" id="mouth1" d="M34 54 Q41 58 48 54" stroke="#0f172a" stroke-width="2.4" stroke-linecap="round" fill="none"/>
            </g>
            <g>
              <rect x="78" y="44" width="38" height="96" rx="14" fill="#34d399"/>
              <rect x="76" y="22" width="42" height="32" rx="10" fill="#6ee7b7"/>
              <ellipse class="eye-white" cx="90" cy="37" rx="5.5" ry="5.2" fill="#f8fafc"/>
              <ellipse class="eye-white" cx="104" cy="37" rx="5.5" ry="5.2" fill="#f8fafc"/>
              <circle class="pupil" cx="90" cy="37" r="2.2" fill="#0f172a" data-bx="90" data-by="37" data-mult="0.9"/>
              <circle class="pupil" cx="104" cy="37" r="2.2" fill="#0f172a" data-bx="104" data-by="37" data-mult="0.9"/>
              <path class="mouth" id="mouth2" d="M90 46 Q97 50 104 46" stroke="#0f172a" stroke-width="2.4" stroke-linecap="round" fill="none"/>
            </g>
            <g>
              <rect x="134" y="58" width="38" height="82" rx="14" fill="#f59e0b"/>
              <rect x="132" y="36" width="42" height="32" rx="10" fill="#fbbf24"/>
              <ellipse class="eye-white" cx="146" cy="51" rx="5.5" ry="5.2" fill="#f8fafc"/>
              <ellipse class="eye-white" cx="160" cy="51" rx="5.5" ry="5.2" fill="#f8fafc"/>
              <circle class="pupil" cx="146" cy="51" r="2.2" fill="#0f172a" data-bx="146" data-by="51" data-mult="1.1"/>
              <circle class="pupil" cx="160" cy="51" r="2.2" fill="#0f172a" data-bx="160" data-by="51" data-mult="1.1"/>
              <path class="mouth" id="mouth3" d="M146 60 Q153 64 160 60" stroke="#0f172a" stroke-width="2.4" stroke-linecap="round" fill="none"/>
            </g>
            <g>
              <rect x="190" y="48" width="38" height="92" rx="14" fill="#a78bfa"/>
              <rect x="188" y="26" width="42" height="32" rx="10" fill="#c4b5fd"/>
              <ellipse class="eye-white" cx="202" cy="41" rx="5.5" ry="5.2" fill="#f8fafc"/>
              <ellipse class="eye-white" cx="216" cy="41" rx="5.5" ry="5.2" fill="#f8fafc"/>
              <circle class="pupil" cx="202" cy="41" r="2.2" fill="#0f172a" data-bx="202" data-by="41" data-mult="0.85"/>
              <circle class="pupil" cx="216" cy="41" r="2.2" fill="#0f172a" data-bx="216" data-by="41" data-mult="0.85"/>
              <path class="mouth" id="mouth4" d="M202 50 Q209 54 216 50" stroke="#0f172a" stroke-width="2.4" stroke-linecap="round" fill="none"/>
            </g>
          </svg>
        </div>
        <h2>Mail Agent Workspace</h2>
        <p>连接你的邮箱后，系统会自动分类邮件并给出推荐处理策略，再由你确认执行。</p>
        <ul class="feature-list">
          <li>自动识别验证码、广告、通知、故障、审批等类别</li>
          <li>同类邮件聚合展示，逐封确认执行</li>
          <li>支持 IMAP 与 POP3 兜底，避免收件通道中断</li>
        </ul>
      </div>
      <div class="login-form">
      <div class="login-title">🔐 邮箱账号登录</div>
      <p class="login-subtitle">请输入邮箱与授权码开始处理流程</p>
      <div class="badge-row">
        <span class="badge">IMAP/SMTP</span>
        <span class="badge">POP3 Fallback</span>
      </div>
      <div class="row">
        <div>
          <label for="emailAddress">邮箱地址</label>
          <input id="emailAddress" placeholder="your_email@example.com" />
        </div>
        <div>
          <label for="appPassword">邮箱授权码/应用密码</label>
          <div class="password-wrap">
            <input id="appPassword" type="password" />
            <button id="togglePasswordBtn" class="eye-btn" type="button" title="显示/隐藏密码">👁️</button>
          </div>
        </div>
      </div>
      <div class="status">连接参数由后端统一配置（默认 163 邮箱 IMAP/SMTP/POP3）。</div>
      <div class="row">
        <button id="loginMailboxBtn">邮箱登录</button>
        <button id="logoutMailboxBtn">退出登录</button>
      </div>
      <div id="mailboxStatus" class="status">未登录</div>
      </div>
    </div>

  </div>

  <script>
    const loginMailboxBtn = document.getElementById("loginMailboxBtn");
    const logoutMailboxBtn = document.getElementById("logoutMailboxBtn");
    const statusEl = document.getElementById("status");
    const mailboxStatusEl = document.getElementById("mailboxStatus");
    const togglePasswordBtn = document.getElementById("togglePasswordBtn");
    const appPasswordInput = document.getElementById("appPassword");
    const mascotSvg = document.getElementById("mascotSvg");
    const pupils = Array.from(document.querySelectorAll(".pupil"));
    const mouths = [
      document.getElementById("mouth1"),
      document.getElementById("mouth2"),
      document.getElementById("mouth3"),
      document.getElementById("mouth4")
    ];
    let passwordVisible = false;

    function tryParseJson(text) {
      try {
        return JSON.parse(text);
      } catch (_) {
        return null;
      }
    }

    async function loginMailbox() {
      const payload = {
        email_address: document.getElementById("emailAddress").value.trim(),
        app_password: document.getElementById("appPassword").value.trim()
      };
      if (!payload.email_address || !payload.app_password) {
        mailboxStatusEl.textContent = "请填写邮箱地址与授权码。";
        return;
      }
      loginMailboxBtn.disabled = true;
      loginMailboxBtn.classList.add("loading");
      setFaceState("neutral");
      mailboxStatusEl.textContent = "登录验证中...";
      try {
        const resp = await fetch("/login-mailbox", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const raw = await resp.text();
        const data = tryParseJson(raw);
        if (!resp.ok) throw new Error(data ? JSON.stringify(data) : raw);
        mailboxStatusEl.textContent = `登录成功: ${data.email_address}`;
        statusEl.textContent = "登录成功，正在跳转工作台...";
        setFaceState("happy");
        setTimeout(() => { window.location.href = "/workspace"; }, 300);
      } catch (err) {
        mailboxStatusEl.textContent = `登录失败: ${String(err)}`;
        setFaceState("sad");
        const loginCard = document.getElementById("loginCard");
        loginCard.classList.remove("shake");
        void loginCard.offsetWidth;
        loginCard.classList.add("shake");
      } finally {
        loginMailboxBtn.disabled = false;
        loginMailboxBtn.classList.remove("loading");
      }
    }

    async function logoutMailbox() {
      logoutMailboxBtn.disabled = true;
      mailboxStatusEl.textContent = "退出中...";
      try {
        const resp = await fetch("/logout-mailbox", { method: "POST" });
        const raw = await resp.text();
        const data = tryParseJson(raw);
        if (!resp.ok) throw new Error(data ? JSON.stringify(data) : raw);
        mailboxStatusEl.textContent = "已退出登录";
        statusEl.textContent = "请先登录邮箱。";
      } catch (err) {
        mailboxStatusEl.textContent = `退出失败: ${String(err)}`;
      } finally {
        logoutMailboxBtn.disabled = false;
      }
    }
    loginMailboxBtn.addEventListener("click", loginMailbox);
    logoutMailboxBtn.addEventListener("click", logoutMailbox);
    togglePasswordBtn.addEventListener("click", () => {
      passwordVisible = !passwordVisible;
      appPasswordInput.type = passwordVisible ? "text" : "password";
      togglePasswordBtn.textContent = passwordVisible ? "🙈" : "👁️";
    });

    function setFaceState(state) {
      const paths = {
        neutral: [
          "M34 54 Q41 58 48 54",
          "M90 46 Q97 50 104 46",
          "M146 60 Q153 64 160 60",
          "M202 50 Q209 54 216 50"
        ],
        happy: [
          "M34 52 Q41 61 48 52",
          "M90 44 Q97 53 104 44",
          "M146 58 Q153 67 160 58",
          "M202 48 Q209 57 216 48"
        ],
        sad: [
          "M34 58 Q41 50 48 58",
          "M90 50 Q97 42 104 50",
          "M146 64 Q153 56 160 64",
          "M202 54 Q209 46 216 54"
        ]
      };
      const chosen = paths[state] || paths.neutral;
      mouths.forEach((m, i) => m.setAttribute("d", chosen[i]));
    }

    function trackEyes(event) {
      const rect = mascotSvg.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      const dx = event.clientX - centerX;
      const dy = event.clientY - centerY;
      const distance = Math.hypot(dx, dy) || 1;
      const maxOffset = 4.2;
      const ox = (dx / distance) * maxOffset;
      const oy = (dy / distance) * maxOffset;

      pupils.forEach((p) => {
        const bx = Number(p.dataset.bx);
        const by = Number(p.dataset.by);
        const mult = Number(p.dataset.mult || "1");
        p.setAttribute("cx", String(bx + ox * mult));
        p.setAttribute("cy", String(by + oy * mult));
      });
    }

    document.addEventListener("mousemove", trackEyes);
    setFaceState("neutral");
  </script>
</body>
</html>
